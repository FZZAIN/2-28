<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FZZAIN RECON</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f0f0f;
color:white;
}

header{
background:#000;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
border-bottom:2px solid gold;
}

.container{
max-width:1300px;
margin:auto;
padding:20px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
margin-bottom:15px;
background:#1f1f1f;
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.card{
background:#1a1a1a;
border-radius:15px;
overflow:hidden;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.price{
font-size:24px;
font-weight:bold;
color:gold;
margin:10px 0;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#25d366;
color:white;
font-weight:bold;
cursor:pointer;
}

.wa{
position:fixed;
bottom:20px;
right:20px;
background:#25d366;
padding:16px;
border-radius:50%;
font-size:22px;
text-decoration:none;
color:white;
}
</style>
</head>

<body>

<header>🚗 FZZAIN RECON</header>

<div class="container">

<input type="text" id="search" placeholder="Cari kereta / brand">

<div class="grid" id="carList"></div>

</div>

<a href="admin.html" class="wa">🔐</a>

<script>

let cars = JSON.parse(localStorage.getItem("cars")) || [];

function render(){

let search = document.getElementById("search").value.toLowerCase();

let html = "";

cars.filter(car =>
car.name.toLowerCase().includes(search) ||
car.brand.toLowerCase().includes(search)
)

.forEach(car=>{

html += `
<div class="card">

<img src="${car.img}">

<div class="card-body">

<h3>${car.name}</h3>

<div class="price">
RM ${car.price.toLocaleString()}
</div>

<p>${car.brand} • ${car.year}</p>
<p>${car.mileage}</p>
<p>${car.features}</p>

<button onclick="wa('${car.name}',${car.price})">
WhatsApp Inquiry
</button>

</div>
</div>
`;

});

document.getElementById("carList").innerHTML = html;

}

function wa(name,price){

let msg = `Saya berminat dengan ${name} RM${price}`;

window.open("https://wa.me/60123456789?text="+encodeURIComponent(msg));

}

document.getElementById("search").onkeyup = render;

render();

</script>

</body>
</html>

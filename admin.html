<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SHOWROOM PRO MAX</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white;}

header{
background:#000;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
border-bottom:2px solid red;
}

.container{max-width:900px;margin:auto;padding:15px;}

input,button{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:8px;
}

input{background:#1f1f1f;color:white;}

button{background:#25d366;color:white;font-weight:bold;}

.card{
background:#1a1a1a;
padding:15px;
margin-top:10px;
border-radius:12px;
}

.card img{
width:100%;
border-radius:10px;
margin-top:8px;
}

.edit{background:#ff9800;margin-top:6px;}
.delete{background:red;margin-top:6px;}
.whatsapp{background:#00c853;margin-top:6px;}
.logout{background:#ff4444;}

.nav{
display:flex;
gap:10px;
margin-bottom:10px;
}

.nav button{flex:1;background:#333;}
.small{font-size:12px;opacity:0.7;}
</style>
</head>

<body>

<header>đźš— SHOWROOM PRO MAX SYSTEM</header>

<div class="container">

<!-- NAV -->
<div class="nav">
<button onclick="showAdmin()">Admin</button>
<button onclick="showCustomer()">Customer</button>
</div>

<!-- LOGIN -->
<div id="loginBox">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login Admin</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none;">

<button class="logout" onclick="logout()">Logout</button>

<h3>Tambah / Edit Kereta</h3>

<input id="name" placeholder="Nama">
<input id="brand" placeholder="Brand">
<input id="price" placeholder="Harga">
<input id="year" placeholder="Tahun">
<input id="mileage" placeholder="Mileage">
<input id="features" placeholder="Features">

<input type="file" id="imgFile">

<button onclick="saveCar()">Simpan</button>

<h3>Stock Admin</h3>
<div id="adminList"></div>

</div>

<!-- CUSTOMER VIEW -->
<div id="customerPanel" style="display:none;">
<h3>Showroom Kereta</h3>
<div id="customerList"></div>
</div>

</div>

<script>

/* đź”Ą FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

/* STATE */
let editId = null;

/* AUTH LOGIN */
function login(){
auth.signInWithEmailAndPassword(email.value, password.value)
.then(()=>alert("Login success"))
.catch(e=>alert(e.message));
}

function logout(){
auth.signOut();
}

/* AUTO LOGIN */
auth.onAuthStateChanged(user=>{
if(user){
loginBox.style.display="none";
adminPanel.style.display="block";
loadAdmin();
loadCustomer();
}else{
loginBox.style.display="block";
adminPanel.style.display="none";
}
});

/* NAV */
function showAdmin(){
adminPanel.style.display="block";
customerPanel.style.display="none";
}

function showCustomer(){
customerPanel.style.display="block";
adminPanel.style.display="none";
}

/* UPLOAD IMAGE */
async function uploadImage(file){
const ref = storage.ref("cars/"+Date.now());
await ref.put(file);
return await ref.getDownloadURL();
}

/* SAVE CAR (ADD / UPDATE) */
async function saveCar(){

let file = imgFile.files[0];
let imgUrl = "";

if(file){
imgUrl = await uploadImage(file);
}

let data = {
name:name.value,
brand:brand.value,
price:Number(price.value),
year:year.value,
mileage:mileage.value,
features:features.value,
img:imgUrl || ""
};

if(editId){
await db.collection("cars").doc(editId).set(data);
editId=null;
}else{
await db.collection("cars").add(data);
}

clearForm();
}

/* LOAD ADMIN */
function loadAdmin(){
db.collection("cars").onSnapshot(snap=>{
let html="";
snap.forEach(doc=>{
let c = doc.data();

html += `
<div class="card">
<h3>${c.name}</h3>
<p>RM ${c.price}</p>
<p>${c.brand}</p>

<img src="${c.img}">

<button class="edit" onclick="editCar('${doc.id}',\`${c.name}\`,\`${c.brand}\`,${c.price},\`${c.year}\`,\`${c.mileage}\`,\`${c.features}\`)">Edit</button>

<button class="delete" onclick="deleteCar('${doc.id}')">Delete</button>
</div>
`;
});

adminList.innerHTML = html;
});
}

/* LOAD CUSTOMER */
function loadCustomer(){
db.collection("cars").onSnapshot(snap=>{
let html="";

snap.forEach(doc=>{
let c=doc.data();

html += `
<div class="card">
<h3>${c.name}</h3>
<p>RM ${c.price}</p>

<img src="${c.img}">

<a href="https://wa.me/601136756741?text=Saya%20nak%20tanya%20${c.name}" target="_blank">
<button class="whatsapp">WhatsApp</button>
</a>

</div>
`;
});

customerList.innerHTML = html;
});
}

/* EDIT */
function editCar(id,n,b,p,y,m,f){
editId=id;

name.value=n;
brand.value=b;
price.value=p;
year.value=y;
mileage.value=m;
features.value=f;

showAdmin();
}

/* DELETE */
function deleteCar(id){
if(confirm("Delete?")){
db.collection("cars").doc(id).delete();
}
}

/* CLEAR */
function clearForm(){
name.value="";
brand.value="";
price.value="";
year.value="";
mileage.value="";
features.value="";
imgFile.value="";
}

</script>

</body>
</html>

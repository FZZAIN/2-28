<script>

let cars = JSON.parse(localStorage.getItem("cars")) || [];

function save(){
localStorage.setItem("cars", JSON.stringify(cars));
}

function addCar(){

let car = {
name: name.value.trim(),
brand: brand.value.trim(),
price: Number(price.value),
year: year.value.trim(),
mileage: mileage.value.trim(),
img: img.value.trim(),
features: features.value.trim()
};

if(
car.name==="" ||
car.brand==="" ||
car.price<=0 ||
car.year===""
){
alert("⚠️ Sila isi lengkap");
return;
}

cars.push(car);

save();
render();

clearForm();

alert("✅ Kereta berjaya ditambah");

}

function clearForm(){
name.value="";
brand.value="";
price.value="";
year.value="";
mileage.value="";
img.value="";
features.value="";
}

function render(){

let html="";

cars.forEach((car,i)=>{

html += `
<div class="card">
<h3>${car.name}</h3>
<p>Brand: ${car.brand}</p>
<p>RM ${car.price.toLocaleString()}</p>
<p>${car.year}</p>

<button class="delete" onclick="del(${i})">
Delete
</button>
</div>
`;

});

stock.innerHTML = html;

}

function del(i){

if(confirm("Padam kereta ini?")){
cars.splice(i,1);
save();
render();
}

}

</script>

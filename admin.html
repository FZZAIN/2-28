/* ================= DOM ================= */
const email = document.getElementById("email");
const password = document.getElementById("password");

const loginBox = document.getElementById("loginBox");

const adminList = document.getElementById("adminList");

const name = document.getElementById("name");

/* ================= SECURITY TEXT ================= */
function escapeText(str){
  return String(str || "")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

/* ================= VIEW CONTROL ================= */
function show(view){
  loginBox.style.display="none";
  adminPanel.style.display="none";
  customerPanel.style.display="none";

  if(view==="login") loginBox.style.display="block";
  if(view==="admin") adminPanel.style.display="block";
  if(view==="customer") customerPanel.style.display="block";
}

/* ================= LOGIN ================= */
function login(){
  auth.signInWithEmailAndPassword(email.value, password.value)
  .then(res=>{
    if(res.user.email !== ADMIN_EMAIL){
      auth.signOut();
      alert("Access Denied");
      return;
    }

    show("admin");
    loadAdmin();
    loadCustomer();
  })
  .catch(e=>alert(e.message));
}

/* ================= LOGOUT ================= */
function logout(){
  auth.signOut().then(()=>show("login"));
}

/* ================= AUTH STATE ================= */
auth.onAuthStateChanged(user=>{
  if(user && user.email === ADMIN_EMAIL){
    show("admin");
    loadAdmin();
    loadCustomer();
  } else {
    show("customer");
  }
});

/* ================= UPLOAD ================= */
async function uploadImage(file){
  const name = Date.now() + "_" + Math.random().toString(36).slice(2);
  const ref = storage.ref("cars/" + name);
  await ref.put(file);
  return await ref.getDownloadURL();
}
